<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DrTetryon – AI Console</title>
  <style>
    :root {
      --bg-main: #ffffff;
      --bg-sidebar: #111111;
      --bg-chat: #f7f7f7;
      --accent-purple: #7b3cff;
      --accent-orange: #ff7b2c;
      --text-main: #000000;
      --text-light: #f5f5f5;
      --border-subtle: #dddddd;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg-main);
      color: var(--text-main);
      height: 100vh;
      display: flex;
    }

    /* Layout */
    .app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .sidebar {
      width: 260px;
      background: var(--bg-sidebar);
      color: var(--text-light);
      display: flex;
      flex-direction: column;
      border-right: 1px solid #000;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-title {
      font-size: 16px;
      font-weight: 600;
    }

    .home-link {
      font-size: 13px;
      color: var(--accent-orange);
      text-decoration: none;
    }

    .home-link:hover {
      text-decoration: underline;
    }

 .sidebar-actions {
  padding: 12px 16px;
  border-bottom: 1px solid #333;
  display: flex;
  flex-direction: column;
  gap: 8px;
}


    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }

    .btn-new {
      background: var(--accent-purple);
      color: var(--text-light);
      width: 100%;
    }

    .btn-new:hover {
      filter: brightness(1.1);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .conversation-item {
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 1px solid #222;
    }

    .conversation-item.active {
      background: #222;
      border-left: 3px solid var(--accent-orange);
    }

    .conversation-item:hover {
      background: #1a1a1a;
    }

    .conversation-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-chat);
    }

    .main-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fff;
    }

    .main-title {
      font-size: 16px;
      font-weight: 600;
    }

    .model-tag {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-orange);
      color: #fff;
    }

    .chat-window {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    .message {
      max-width: 720px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .message.user {
      background: #ffffff;
      border: 1px solid var(--border-subtle);
      align-self: flex-end;
    }

    .message.assistant {
      background: #1b1b1b;
      color: var(--text-light);
      border: 1px solid #000;
      align-self: flex-start;
    }

    .chat-input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border-subtle);
      background: #fff;
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-subtle);
      font-size: 14px;
    }

    .btn-send {
      background: var(--accent-purple);
      color: var(--text-light);
    }

    .btn-send:hover {
      filter: brightness(1.1);
    }

    .status {
      font-size: 12px;
      color: #666;
      padding: 4px 16px 8px;
    }

<!-- this is supposed to be css for spacing the buttons but it did not work
   .sidebar-actions .btn {
  margin-bottom: 8px;
}
-->


  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">DrTetryon Sessions</div>
        <a href="https://tetryonics.org" class="home-link">← Back to Tetryonics.org</a>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-new" id="newChatBtn">+ New Chat</button>
      </div>
      <div class="sidebar-list" id="conversationList"></div>
    </div>

<div style="margin-bottom:10px;">
  <button class="btn btn-new" id="newChatBtn">+ New Chat</button>
</div>

<div>
  <button class="btn btn-new" onclick="downloadChats()">Download Chats</button>
</div>


    <!-- Main chat area -->
    <div class="main">
      <div class="main-header">
        <div class="main-title" id="conversationTitle">New Chat</div>
        <div class="model-tag">Model: DrTetryon</div>
      </div>
      <div class="chat-window" id="chatWindow"></div>
      <div class="status" id="status"></div>
      <div class="chat-input-bar">
        <input
          type="text"
          id="chatInput"
          class="chat-input"
          placeholder="Ask DrTetryon a question..."
        />
        <button class="btn btn-send" id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    // --- Simple localStorage-based conversation store ---
    const STORAGE_KEY = "drtetryon_conversations_v1";

    let conversations = [];
    let activeConversationId = null;

    function loadConversations() {
      const raw = localStorage.getItem(STORAGE_KEY);
      conversations = raw ? JSON.parse(raw) : [];
    }

    function saveConversations() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(conversations));
    }

    function createConversation() {
      const id = Date.now().toString();
      const convo = {
        id,
        title: "New Chat",
        messages: []
      };
      conversations.unshift(convo);
      activeConversationId = id;
      saveConversations();
      renderSidebar();
      renderActiveConversation();
    }

    function setActiveConversation(id) {
      activeConversationId = id;
      renderSidebar();
      renderActiveConversation();
    }

    function getActiveConversation() {
      return conversations.find(c => c.id === activeConversationId) || null;
    }

    function updateConversationTitleFromFirstMessage(convo) {
      const firstUserMsg = convo.messages.find(m => m.role === "user");
      if (firstUserMsg) {
        convo.title = firstUserMsg.content.slice(0, 40) + (firstUserMsg.content.length > 40 ? "…" : "");
      }
    }

    // --- Rendering ---
    function renderSidebar() {
      const list = document.getElementById("conversationList");
      list.innerHTML = "";
      conversations.forEach(convo => {
        const item = document.createElement("div");
        item.className = "conversation-item" + (convo.id === activeConversationId ? " active" : "");
        const title = document.createElement("div");
        title.className = "conversation-title";
        title.textContent = convo.title || "Untitled";
        item.appendChild(title);
        item.onclick = () => setActiveConversation(convo.id);
        list.appendChild(item);
      });
    }

    function renderActiveConversation() {
      const convo = getActiveConversation();
      const chatWindow = document.getElementById("chatWindow");
      const titleEl = document.getElementById("conversationTitle");
      chatWindow.innerHTML = "";

      if (!convo) {
        titleEl.textContent = "No conversation selected";
        return;
      }

      titleEl.textContent = convo.title || "New Chat";

      convo.messages.forEach(msg => {
        const div = document.createElement("div");
        div.className = "message " + (msg.role === "user" ? "user" : "assistant");
        div.textContent = msg.content;
        chatWindow.appendChild(div);
      });

      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // --- Sending messages to Ollama ---
    async function sendMessage() {
      const input = document.getElementById("chatInput");
      const status = document.getElementById("status");
      const text = input.value.trim();
      if (!text) return;

      let convo = getActiveConversation();
      if (!convo) {
        createConversation();
        convo = getActiveConversation();
      }

      // Add user message
      convo.messages.push({ role: "user", content: text });
      updateConversationTitleFromFirstMessage(convo);
      saveConversations();
      renderSidebar();
      renderActiveConversation();
      input.value = "";
      status.textContent = "Thinking…";

      try {
        const response = await fetch("https://ai.tetryonics.org/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "DrTetryon",
            messages: convo.messages.map(m => ({
              role: m.role,
              content: m.content
            }))
          })
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();
        const assistantMsg = data.message?.content || "(No response)";
        convo.messages.push({ role: "assistant", content: assistantMsg });
        saveConversations();
        renderActiveConversation();
        status.textContent = "";
      } catch (err) {
        status.textContent = "Error talking to DrTetryon.";
        console.error(err);
      }
    }

    // --- Event wiring ---
    document.getElementById("newChatBtn").onclick = () => {
      createConversation();
    };

    document.getElementById("sendBtn").onclick = () => {
      sendMessage();
    };

    document.getElementById("chatInput").addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // --- Init ---
    loadConversations();
    if (conversations.length === 0) {
      createConversation();
    } else {
      activeConversationId = conversations[0].id;
      renderSidebar();
      renderActiveConversation();
    }

    // --- Download chats as JSON ---

    function downloadChats() {
  const raw = localStorage.getItem("drtetryon_conversations_v1");
  if (!raw) {
    alert("No chats found.");
    return;
  }

  const blob = new Blob([raw], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "drtetryon_chats.json";
  a.click();

  URL.revokeObjectURL(url);
}

  </script>
</body>
</html>
